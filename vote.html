<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>投票與統計</title>
  <link rel="stylesheet" href="vote.css" />
</head>
<body>
  <main class="page">
    <a href="index.html" class="back">← Back</a>

    <section class="title">
      <h1>VOTE MAP</h1>
      <p>新竹人的麥當勞生活圖鑑</p>
    </section>

    <section class="vote-card">
      <div class="axis-title y-title">品嚐頻率</div>
      <div class="axis-title x-title">喜好程度</div>

<p class="hint">
  點擊圖上任一位置，釘上你的投票點。<br>
  （品嚐頻率：0＝兩個月一次、1＝每月一次、2＝兩週一次、3＝每週一次、4＝每週多次、5＝每兩天至少一次）
</p>

      <div id="votePole" class="vote-pole">
        <div class="axis-x"></div>
        <div class="axis-y"></div>
        <div class="zero-line"></div>
      </div>
    </section>

    <div class="button-row">
      <button id="submitVote" class="blob-button">提交投票</button>
      <a href="result.html" class="blob-button">查看平均結果</a>
    </div>
  </main>

  <script src="vote.js"></script>
</body>
</html>
